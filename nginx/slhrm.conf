# SLHRM PWA route
# Serves the PWA at /slhrm with SPA fallback to index.html
# NOTE: This must be pasted INSIDE the server {} block in frappe.conf
# The PWA files live at sites/slhrm_pwa/ (not in the shared assets volume)
# because refresh_assets.sh would overwrite assets/slhrm/frontend/.
location /slhrm {
    alias /home/frappe/frappe-bench/sites/slhrm_pwa;
    try_files $uri $uri/ /slhrm/index.html;
}
