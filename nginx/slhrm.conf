# SLHRM PWA route
# Serves the PWA at /slhrm with SPA fallback to index.html
# NOTE: This must be pasted INSIDE the server {} block in frappe.conf
# PWA was built with --base=/assets/slhrm/frontend/ so assets are at that path.
# The PWA files live in the shared assets volume (assets/slhrm/frontend/).
location /slhrm {
    alias /home/frappe/frappe-bench/sites/assets/slhrm/frontend;
    try_files $uri $uri/ /slhrm/index.html;
}
